<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>La Turba Radio</title>
  <meta name="description" content="Radio La Turba — vivir en la radio. Escuchá en vivo." />
  <meta name="theme-color" content="#e8157e" />

  <!-- PWA -->
  <link rel="manifest" href="/laturba-radio/manifest.json" />
  <link rel="apple-touch-icon" href="/laturba-radio/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="La Turba" />

  <!-- Open Graph -->
  <meta property="og:title" content="La Turba Radio" />
  <meta property="og:description" content="Escuchá La Turba en vivo" />
  <meta property="og:image" content="/laturba-radio/icons/icon-512.png" />
  <meta property="og:type" content="website" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      overscroll-behavior: none;
    }

    .app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
      padding-bottom: max(env(safe-area-inset-bottom, 0px), 1.5rem);
    }

    /* HEADER */
    .header {
      width: 100%;
      background: #111;
      padding: 2.5rem 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo-svg {
      width: 220px;
      height: auto;
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: #e8e000;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* PLAYER CARD */
    .player-card {
      width: calc(100% - 2rem);
      background: #1a1a1a;
      border-radius: 20px;
      border: 1px solid #2a2a2a;
      padding: 1.75rem 1.5rem;
      margin: 0 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .on-air {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #666;
      text-transform: uppercase;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      transition: background 0.3s;
    }

    .dot.live {
      background: #e8e000;
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

    .on-air.live {
      color: #e8e000;
    }

    .play-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #e8157e;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .play-btn:hover { background: #cc1070; }
    .play-btn:active { transform: scale(0.93); }

    .play-btn svg {
      width: 32px;
      height: 32px;
      fill: #fff;
    }

    .status {
      font-size: 13px;
      color: #666;
      text-align: center;
      min-height: 18px;
      transition: color 0.3s;
    }

    .status.live { color: #e8e000; }
    .status.error { color: #e84040; }

    /* VOLUME */
    .vol-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .vol-icon {
      width: 18px;
      height: 18px;
      fill: #555;
      flex-shrink: 0;
    }

    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: #333;
      border-radius: 2px;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #e8157e;
      cursor: pointer;
    }

    input[type=range]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border: none;
      border-radius: 50%;
      background: #e8157e;
      cursor: pointer;
    }

    .vol-label {
      font-size: 12px;
      color: #555;
      min-width: 32px;
      text-align: right;
    }

    /* DIVIDER */
    .divider {
      width: calc(100% - 2rem);
      height: 1px;
      background: #1e1e1e;
      margin: 0 1rem 1rem;
    }

    /* SOCIAL */
    .section-label {
      width: calc(100% - 2rem);
      font-size: 10px;
      letter-spacing: 0.18em;
      color: #444;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      padding: 0 0.25rem;
    }

    .social-list {
      width: calc(100% - 2rem);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #1a1a1a;
      border: 1px solid #242424;
      border-radius: 14px;
      padding: 0.85rem 1rem;
      text-decoration: none;
      color: #ccc;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .social-btn:active {
      background: #222;
      border-color: #333;
    }

    .icon-wrap {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .social-btn .text { flex: 1; }
    .social-btn .name { font-size: 14px; font-weight: 500; }
    .social-btn .handle { font-size: 12px; color: #555; margin-top: 2px; }
    .social-btn .arrow { color: #444; font-size: 18px; }

    /* Install banner */
    #install-banner {
      display: none;
      width: calc(100% - 2rem);
      background: #1d1428;
      border: 1px solid #3a2060;
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 1rem;
      flex-direction: column;
      gap: 10px;
    }

    #install-banner.visible { display: flex; }

    .install-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .install-top span {
      font-size: 13px;
      color: #ccc;
      flex: 1;
    }

    .install-close {
      background: none;
      border: none;
      color: #555;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }

    .install-btn {
      background: #e8157e;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.65rem 1rem;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }

    .install-btn:active { opacity: 0.85; }
  </style>
</head>
<body>

<div class="app" role="main">

  <div class="header">
    <svg class="logo-svg" viewBox="0 0 400 190" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="La Turba Radio">
      <title>La Turba Radio</title>
      <text x="50%" y="75" text-anchor="middle"
        font-family="Impact, Arial Black, sans-serif"
        font-size="84" font-weight="900"
        fill="#e8157e" stroke="#e8e000" stroke-width="2.5" letter-spacing="-2">LA</text>
      <text x="50%" y="168" text-anchor="middle"
        font-family="Impact, Arial Black, sans-serif"
        font-size="92" font-weight="900"
        fill="#e8157e" stroke="#e8e000" stroke-width="2.5" letter-spacing="3">TURBA</text>
    </svg>
    <p class="tagline">Radio en vivo</p>
  </div>

  <!-- Install banner (shown when installable) -->
  <div id="install-banner" role="complementary" aria-label="Instalar app">
    <div class="install-top">
      <span>📲 Instalá La Turba como app en tu cel</span>
      <button class="install-close" id="closeBanner" aria-label="Cerrar">×</button>
    </div>
    <button class="install-btn" id="installBtn">Instalar ahora</button>
  </div>

  <div class="player-card">
    <div class="on-air" id="onAir">
      <div class="dot" id="dot"></div>
      <span id="airLabel">En el aire</span>
    </div>

    <button class="play-btn" id="playBtn" aria-label="Reproducir / Pausar">
      <svg id="playIcon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>

    <p class="status" id="statusText">Tocá para escuchar</p>

    <div class="vol-row" aria-label="Control de volumen">
      <svg class="vol-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
      <input type="range" id="vol" min="0" max="100" value="80"
        aria-label="Volumen" oninput="setVol(this.value)" />
      <span class="vol-label" id="volLabel" aria-live="polite">80%</span>
    </div>
  </div>

  <div class="divider"></div>

  <p class="section-label">Seguinos</p>

  <div class="social-list">

    <a class="social-btn" href="https://instagram.com/radiolaturba" target="_blank" rel="noopener noreferrer" aria-label="Instagram de La Turba">
      <div class="icon-wrap" style="background:#1e1020;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e8157e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4.5"/>
          <circle cx="17.5" cy="6.5" r="0.8" fill="#e8157e" stroke="none"/>
        </svg>
      </div>
      <div class="text">
        <div class="name">Instagram</div>
        <div class="handle">@radiolaturba</div>
      </div>
      <span class="arrow" aria-hidden="true">›</span>
    </a>

    <a class="social-btn" href="https://facebook.com/radiolaturba" target="_blank" rel="noopener noreferrer" aria-label="Facebook de La Turba">
      <div class="icon-wrap" style="background:#0f1525;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#5890FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
        </svg>
      </div>
      <div class="text">
        <div class="name">Facebook</div>
        <div class="handle">/radiolaturba</div>
      </div>
      <span class="arrow" aria-hidden="true">›</span>
    </a>

    <a class="social-btn" href="https://twitter.com/radiolaturba" target="_blank" rel="noopener noreferrer" aria-label="X / Twitter de La Turba">
      <div class="icon-wrap" style="background:#0f1525;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#1DA1F2" aria-hidden="true">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L2.75 2.25H8.5l4.258 5.636L18.244 2.25z"/>
        </svg>
      </div>
      <div class="text">
        <div class="name">X / Twitter</div>
        <div class="handle">@radiolaturba</div>
      </div>
      <span class="arrow" aria-hidden="true">›</span>
    </a>

    <a class="social-btn" href="https://wa.me/5491137594179" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp de La Turba">
      <div class="icon-wrap" style="background:#0f1f14;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#25D366" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
      </div>
      <div class="text">
        <div class="name">WhatsApp</div>
        <div class="handle">11 3759 4179</div>
      </div>
      <span class="arrow" aria-hidden="true">›</span>
    </a>

  </div>
</div>

<script>
  const STREAM = 'https://tus.radios.ar/8024/stream';
  let audio = null;
  let playing = false;
  let deferredPrompt = null;

  const playBtn   = document.getElementById('playBtn');
  const playIcon  = document.getElementById('playIcon');
  const statusEl  = document.getElementById('statusText');
  const dotEl     = document.getElementById('dot');
  const onAirEl   = document.getElementById('onAir');
  const airLabel  = document.getElementById('airLabel');
  const volSlider = document.getElementById('vol');
  const volLabel  = document.getElementById('volLabel');
  const banner    = document.getElementById('install-banner');
  const installBtn= document.getElementById('installBtn');
  const closeBtn  = document.getElementById('closeBanner');

  const PLAY_PATH  = 'M8 5v14l11-7z';
  const PAUSE_PATH = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';

  function setUIState(state) {
    if (state === 'loading') {
      statusEl.textContent = 'Conectando...';
      statusEl.className = 'status';
      dotEl.className = 'dot';
      onAirEl.className = 'on-air';
      airLabel.textContent = 'En el aire';
    } else if (state === 'playing') {
      statusEl.textContent = 'En vivo ahora';
      statusEl.className = 'status live';
      dotEl.className = 'dot live';
      onAirEl.className = 'on-air live';
      airLabel.textContent = 'En vivo';
      playIcon.querySelector('path').setAttribute('d', PAUSE_PATH);
    } else if (state === 'error') {
      statusEl.textContent = 'No se pudo conectar. Intentá de nuevo.';
      statusEl.className = 'status error';
      dotEl.className = 'dot';
      onAirEl.className = 'on-air';
      playIcon.querySelector('path').setAttribute('d', PLAY_PATH);
    } else {
      statusEl.textContent = 'Tocá para escuchar';
      statusEl.className = 'status';
      dotEl.className = 'dot';
      onAirEl.className = 'on-air';
      airLabel.textContent = 'En el aire';
      playIcon.querySelector('path').setAttribute('d', PLAY_PATH);
    }
  }

  function togglePlay() {
    if (playing) {
      audio.pause();
      audio.src = '';
      playing = false;
      setUIState('stopped');
      return;
    }

    if (!audio) {
      audio = new Audio();
      audio.addEventListener('canplay', () => {
        audio.play().then(() => {
          playing = true;
          setUIState('playing');
        }).catch(() => {
          playing = false;
          setUIState('error');
        });
      });
      audio.addEventListener('error', () => {
        playing = false;
        setUIState('error');
      });
      audio.addEventListener('ended', () => {
        playing = false;
        setUIState('stopped');
      });
    }

    setUIState('loading');
    audio.src = STREAM;
    audio.volume = volSlider.value / 100;
    audio.load();
  }

  function setVol(v) {
    const pct = Math.round(v);
    volLabel.textContent = pct + '%';
    if (audio) audio.volume = v / 100;
  }

  playBtn.addEventListener('click', togglePlay);

  // PWA Install prompt
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    banner.classList.add('visible');
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    banner.classList.remove('visible');
  });

  closeBtn.addEventListener('click', () => {
    banner.classList.remove('visible');
    deferredPrompt = null;
  });

  window.addEventListener('appinstalled', () => {
    banner.classList.remove('visible');
  });

  // Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/laturba-radio/sw.js').catch(console.error);
    });
  }
</script>

</body>
</html>
